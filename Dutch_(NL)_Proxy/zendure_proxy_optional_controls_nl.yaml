##########################################################################################
## Dit package bestand bevat optioneel te gebruiken yaml elementen voor de Zendure Proxy##
##                                                                                      ##
## Om deze te gebruiken is het nog wel noodzakelijk om de Proxy sensoren te             ##
## plakken in de Gielz package, zie de instructies:                                     ##
## https://github.com/gast777/Zendure-zenSDK-proxy/blob/main/README.nl.md#instructie    ##
##                                                                                      ##
## Plaats dit bestand in de map packages van Home Assistant.                            ##
##                                                                                      ##
## Mocht de map packages nog niet bestaan, die dit:                                     ##
## Maak de map packages aan in Home Assistant (bijvoorbeeld met de tool "File Editor".  ##
## Maak dan een backup van je configuration.yaml.                                       ##
## Pas daarna je configuration.yaml aan door de onderstaande regel toe te voegen.       ##
##                                                                                      ##
##homeassistant:                                                                        ##
##  packages: !include_dir_named packages                                               ##
##                                                                                      ##
##                                                                                      ##
##########################################################################################



template:

  - switch:
  
      - name: "Dual Mode Demper"
        unique_id: Zendure_proxy_dualModeDamper_switch
        state: >
          {{ is_state('sensor.dual_mode_demper_status', 'Aan') }}
        icon: mdi:speedometer-medium
        turn_on:
          - service: rest_command.set_dualmodedamper_on
        turn_off:
          - service: rest_command.set_dualmodedamper_off

      - name: "Beide Actief"
        unique_id: Zendure_proxy_alwaysDualMode_switch
        state: >
          {{ is_state('sensor.beide_actief_status', 'Aan') }}
        icon: mdi:format-columns
        turn_on:
          - service: rest_command.set_alwaysdualmode_on
        turn_off:
          - service: rest_command.set_alwaysdualmode_off
          
      - name: "Synchroon Laden"
        unique_id: Zendure_proxy_equalMode_switch
        state: >
          {{ is_state('sensor.synchroon_laden_status', 'Aan') }}
        icon: >
          {% if is_state('switch.synchroon_laden', 'on') %}
            mdi:battery-sync
          {% else %}
            mdi:battery-sync-outline
          {% endif %}
        turn_on:
          - service: rest_command.set_equalmode_on
        turn_off:
          - service: rest_command.set_equalmode_off

      - name: "Proxy Geen Slaapmodus"
        unique_id: zendure_proxy_nosleep_switch
        state: >
          {{ is_state('sensor.proxy_geen_slaapmodus_status', 'Aan') }}
        icon: >
          {% if is_state('switch.proxy_geen_slaapmodus', 'on') %}
            mdi:sleep-off
          {% else %}
            mdi:sleep
          {% endif %}
        turn_on:
          - service: rest_command.set_proxynosleep_on
        turn_off:
          - service: rest_command.set_proxynosleep_off



      - name: "Zendure Offgrid Socket"
        unique_id: zendure_offgrid_socket
        state: >
          {{ 'on' if is_state('sensor.zendure_2400_ac_offgrid_modus', 'Normaal') else 'off' }}
        icon: mdi:power-socket-de
        turn_on:
          - service: rest_command.set_zendure_offgrid_socket_on
        turn_off:
          - service: rest_command.set_zendure_offgrid_socket_off

      - name: "Zendure 1 Offgrid Socket"
        unique_id: zendure_1_offgrid_socket
        state: >
          {{ 'on' if is_state('sensor.zendure_1_offgrid_modus', 'Normaal') else 'off' }}
        icon: mdi:power-socket-de
        turn_on:
          - service: rest_command.set_zendure_1_offgrid_socket_on
        turn_off:
          - service: rest_command.set_zendure_1_offgrid_socket_off

      - name: "Zendure 2 Offgrid Socket"
        unique_id: zendure_2_offgrid_socket
        state: >
          {{ 'on' if is_state('sensor.zendure_2_offgrid_modus', 'Normaal') else 'off' }}
        icon: mdi:power-socket-de
        turn_on:
          - service: rest_command.set_zendure_2_offgrid_socket_on
        turn_off:
          - service: rest_command.set_zendure_2_offgrid_socket_off

      - name: "Zendure 3 Offgrid Socket"
        unique_id: zendure_3_offgrid_socket
        state: >
          {{ 'on' if is_state('sensor.zendure_3_offgrid_modus', 'Normaal') else 'off' }}
        icon: mdi:power-socket-de
        turn_on:
          - service: rest_command.set_zendure_3_offgrid_socket_on
        turn_off:
          - service: rest_command.set_zendure_3_offgrid_socket_off






rest_command:


  set_zendure_offgrid_socket_on:
    url: "http://{{ states('input_text.zendure_2400_ac_ip_adres') }}/properties/write"
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_2400_ac_serienummer') }}",
        "properties": {
          "gridOffMode": 0
        }
      }

  set_zendure_offgrid_socket_off:
    url: "http://{{ states('input_text.zendure_2400_ac_ip_adres') }}/properties/write"
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_2400_ac_serienummer') }}",
        "properties": {
          "gridOffMode": 2
        }
      }


  set_zendure_1_offgrid_socket_on:
    url: "http://{{ states('sensor.zendure_1_ip_adres') }}/properties/write"
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_1_serienummer') }}",
        "properties": {
          "gridOffMode": 0
        }
      }

  set_zendure_1_offgrid_socket_off:
