    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_1_serienummer') }}",
        "properties": {
          "gridOffMode": 2
        }
      }


  set_zendure_2_offgrid_socket_on:
    url: "http://{{ states('sensor.zendure_2_ip_adres') }}/properties/write"
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_2_serienummer') }}",
        "properties": {
          "gridOffMode": 0
        }
      }

  set_zendure_2_offgrid_socket_off:
    url: "http://{{ states('sensor.zendure_2_ip_adres') }}/properties/write"
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_2_serienummer') }}",
        "properties": {
          "gridOffMode": 2
        }
      }


  set_zendure_3_offgrid_socket_on:
    url: "http://{{ states('sensor.zendure_3_ip_adres') }}/properties/write"
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_3_serienummer') }}",
        "properties": {
          "gridOffMode": 0
        }
      }

  set_zendure_3_offgrid_socket_off:
    url: "http://{{ states('sensor.zendure_3_ip_adres') }}/properties/write"
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_3_serienummer') }}",
        "properties": {
          "gridOffMode": 2
        }
      }


  set_dualmodedamper_on:
    url: http://{{ states('input_text.zendure_2400_ac_ip_adres') }}/properties/write
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_2400_ac_serienummer') }}",
        "properties": {
          "dualModeDamper": {{ 1 }}
        }
      }

  set_dualmodedamper_off:
    url: http://{{ states('input_text.zendure_2400_ac_ip_adres') }}/properties/write
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_2400_ac_serienummer') }}",
        "properties": {
          "dualModeDamper": {{ 0 }}
        }
      }

  set_alwaysdualmode_on:
    url: http://{{ states('input_text.zendure_2400_ac_ip_adres') }}/properties/write
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_2400_ac_serienummer') }}",
        "properties": {
          "alwaysDualMode": {{ 1 }}
        }
      }

  set_alwaysdualmode_off:
    url: http://{{ states('input_text.zendure_2400_ac_ip_adres') }}/properties/write
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_2400_ac_serienummer') }}",
        "properties": {
          "alwaysDualMode": {{ 0 }}
        }
      }
      
  set_equalmode_on:
    url: http://{{ states('input_text.zendure_2400_ac_ip_adres') }}/properties/write
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_2400_ac_serienummer') }}",
        "properties": {
          "equalMode": {{ 1 }}
        }
      }

  set_equalmode_off:
    url: http://{{ states('input_text.zendure_2400_ac_ip_adres') }}/properties/write
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_2400_ac_serienummer') }}",
        "properties": {
          "equalMode": {{ 0 }}
        }
      }

  set_proxynosleep_on:
    url: http://{{ states('input_text.zendure_2400_ac_ip_adres') }}/properties/write
    method: POST
    content_type: "application/json"
    payload: >
      {
        "sn": "{{ states('sensor.zendure_2400_ac_serienummer') }}",
